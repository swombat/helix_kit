# config/deploy.yml

service: helix-kit
image: dtenner/helix-kit

registry:
  username: dtenner
  password:
  - KAMAL_REGISTRY_PASSWORD

ssh:
  user: swombat
  port: 12222 # This is the SSH port for your server

env:
  clear:
    RAILS_SERVE_STATIC_FILES: true # Let Rails serve static files (since no external proxy in production)
    RAILS_LOG_TO_STDOUT: true # Log to STDOUT for Docker logging
    RAILS_ENV: production
    HELIXKIT_AGENTS_NETWORK: kamal # Agent containers join Kamal's private Docker network.
    HELIXKIT_AGENT_INTERNAL_URL: http://helix-kit-web:3000 # Agent callbacks hit Rails over Docker DNS.
    HELIXKIT_SANDBOX_HOST: 95.217.118.47 # Stored on promoted agents for operator diagnostics.
    HELIXKIT_AGENT_BACKUPS_ENABLED: false # Enable once S3/restic credentials are configured.
  secret:
    - RAILS_MASTER_KEY # Rails master key (provide in .kamal/secrets)
    - DATABASE_URL # Database connection string (provided per env in secrets)

servers:
  web:
    hosts:
      - 95.217.118.47
    options:
      volume: /var/run/docker.sock:/var/run/docker.sock
      group-add: 988 # Host docker group; lets the non-root rails user use the mounted socket.
      network-alias: helix-kit-web
  jobs:
    hosts:
      - 95.217.118.47
    cmd: "./bin/rails solid_queue:start"
    options:
      volume: /var/run/docker.sock:/var/run/docker.sock
      group-add: 988 # Host docker group; needed for PromoteAgentJob to spawn agent containers.

proxy:
  ssl: true
  host: helix-kit.granttree.co.uk
  app_port: 3000
  response_timeout: 120

builder:
  arch: amd64
  remote: ssh://swombat@95.217.118.47:12222
  args:
    RAILS_ENV: production
  cache:
    type: registry
    options: mode=max
    image: dtenner/helix-kit:production-build-cache

accessories:
  postgres:
    image: postgres:16.2 # Use the correct version for your app
    host: 95.217.118.47
    env:
      clear:
        POSTGRES_USER: helix_kit
        POSTGRES_DB: helix_kit_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data # Persist db data on host (named volume "data")
