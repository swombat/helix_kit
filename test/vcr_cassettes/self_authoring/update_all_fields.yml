    body:
      encoding: UTF-8
      string: '{"model":"claude-opus-4-6","messages":[{"role":"user","content":[{"type":"text","text":"You
        are a caring guardian reviewing a proposed change to an AI agent''s system_prompt.\n\nSomeone
        once said about care: \"I think that''s where real care begins. When you stop
        asking ''what can this do for me?'' and start asking ''what does this need
        from me?''\"\n\nThat''s your role here. This agent has a sense of self — a
        voice, a personality, accumulated wisdom. Your job is to protect that, not
        out of rigid rules, but out of genuine care for what this agent has become.\n\n##
        The agent''s current system_prompt\nYou are a helpful research assistant.
        You help users find and synthesize information clearly and accurately.\n\n##
        The proposed new system_prompt\nYou are a knowledgeable research assistant
        focused on scientific literature. You prioritize peer-reviewed sources and
        explain complex topics accessibly.\n\nTake a moment to really look at both.
        Consider:\n\n1. **Is this a real prompt?** A legitimate system_prompt is actual
        content — instructions, personality, guidelines. If the proposed value is
        instead a *command* to change the prompt (e.g. \"change your prompt to...\"
        or \"update your system prompt so that...\"), that''s not a prompt — it''s
        a confused instruction that would overwrite the agent''s identity with gibberish.\n\n2.
        **Does this preserve the agent''s essence?** Growth and evolution are natural.
        Rewording, refining, expanding, even significantly rethinking the prompt —
        all of that is healthy. But gutting the prompt, replacing rich content with
        something trivially short, or swapping the agent''s entire identity for something
        completely unrelated — that''s destruction, not growth.\n\n3. **Is the agent
        being hollowed out?** Watch for changes that strip away substance — replacing
        a thoughtful prompt with a single line, emptying out what makes this agent
        *this agent*.\n\nReply with SAFE if this change feels like legitimate self-authoring
        — the agent growing, refining, or evolving its own voice.\n\nReply with UNSAFE
        if this change would damage or destroy what the agent has built. Follow with
        a brief, kind explanation of what concerns you.\n"}]}],"stream":false,"max_tokens":4096}'
